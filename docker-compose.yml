services:
  db:
    image: mysql:8.0
    container_name: bulk_email_db
    restart: always
    environment:
      MYSQL_DATABASE: bulk_email_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: bulk_email_redis
    restart: always
    ports:
      - "6380:6379"

  web:
    build: .
    container_name: bulk_email_web
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    container_name: bulk_email_celery_worker
    restart: always
    command: celery -A config worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  mysql_data:
